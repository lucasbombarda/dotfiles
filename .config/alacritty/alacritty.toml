[general]
import = ["tokyo-night.toml"]
live_config_reload = true

[window]
startup_mode = "Maximized"
title = "Terminal"
dynamic_title = false

[window.padding]
x = 6
y = 6

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[font]
normal = { family = "Iosevka Nerd Font", style = "Regular" }
bold = { family = "Iosevka Nerd Font", style = "Bold" }
italic = { family = "Iosevka Nerd Font", style = "Italic" }
size = 12.0
builtin_box_drawing = true

[cursor]
style = { shape = "Beam", blinking = "Off" }

[selection]
save_to_clipboard = true

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
regex = "(https?://|git@|git://)[\\w\\d.#%&+@\\/=_~:\\-?]+"
binding = { key = "U", mods = "Control|Shift" }
mouse = { enabled = true, mods = "None" }
